version: "3.8"
# หมายเหตุ: PostgreSQL ตัวนี้ใช้เก็บแค่ Airflow metadata (DAG run history) เท่านั้น
# ข้อมูลโปรเจกต์ (bronze/silver/gold) อยู่ใน BigQuery แยกต่างหาก — ดู scripts/poll_youtube.py
# credential อยู่ใน .env (ดู .env.example) ไม่ hardcode ในไฟล์นี้
# ต้องมี gcp-service-account.json ในโฟลเดอร์นี้ (ห้าม commit — อยู่ใน .gitignore แล้ว)

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.0
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      _PIP_ADDITIONAL_REQUIREMENTS: "google-cloud-bigquery==3.25.0 pytrends==4.9.2"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./config:/opt/airflow/config
      - ./scripts:/opt/airflow/scripts
    command: bash -c "airflow db init && airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname A --lastname D --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.9.0
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json
      _PIP_ADDITIONAL_REQUIREMENTS: "google-cloud-bigquery==3.25.0 pytrends==4.9.2"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./config:/opt/airflow/config
      - ./scripts:/opt/airflow/scripts
      - ./gcp-service-account.json:/opt/airflow/gcp-key.json:ro
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.0
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json
      _PIP_ADDITIONAL_REQUIREMENTS: "google-cloud-bigquery==3.25.0 pytrends==4.9.2"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./config:/opt/airflow/config
      - ./scripts:/opt/airflow/scripts
      - ./gcp-service-account.json:/opt/airflow/gcp-key.json:ro
    command: scheduler

volumes:
  pgdata:

# วิธีใช้:
#   1. cp .env.example .env แล้วเติมค่าจริง
#   2. เปิดเฉพาะตอนต้องการ (ไม่ต้องรันค้าง 24 ชม.):
#        docker-compose up -d
#      พอ DAG รันเสร็จแล้ว:
#        docker-compose down